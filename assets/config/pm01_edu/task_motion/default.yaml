# ----------------------- Motion Tasks ----------------------- #
cpu:
  number: 3
  priority: 10

tasks:
- motion: idle
  period: 0.002
  runner:
  - name: idle_runner
    enabled: true
  manual_transition:
  - passive
  auto_transition: passive
  key: [ LB, START ]

- motion: passive
  period: 0.002
  runner:
  - name: passive_runner
    enabled: true
  manual_transition:
  - idle
  - pd_stand
  key: [ LB, RB ]

- motion: pd_stand
  period: 0.002
  runner:
  - name: pd_stand_runner
    enabled: true
    param_tag: pd_stand
  manual_transition:
  - passive
  - walk
  - dance
  - stamp
  - power_shot
  - bilidance
  key: [ LB, A ]

- motion: walk
  period: 0.01
  runner:
  - name: rl_walking_example_runner
    enabled: true
    param_tag: rl_walking_example
  manual_transition:
  - passive
  - pd_stand
  - dance
  - stamp
  - power_shot
  - bilidance
  key: [ LB, B ]

- motion: dance
  period: 0.02
  runner:
  - name: rl_dance_example_runner
    enabled: true
  manual_transition:
  - passive
  - pd_stand
  - walk
  - stamp
  - power_shot
  - bilidance
  auto_transition: walk
  key: [ RB, B ]

- motion: stamp
  period: 0.02
  runner:
  - name: rl_stamp_tracking_runner
    enabled: true
    param_tag: rl_stamp_tracking
  manual_transition:
  - passive
  - pd_stand
  - walk
  - dance
  - power_shot
  - bilidance
  auto_transition: walk
  key: [ RB, A ]

- motion: power_shot
  period: 0.02
  runner:
  - name: rl_power_shot_tracking_runner
    enabled: true
    param_tag: rl_power_shot_tracking
  manual_transition:
  - passive
  - pd_stand
  - walk
  - dance
  - stamp
  - bilidance
  auto_transition: walk
  key: [ RB, X ]

- motion: bilidance
  period: 0.02
  runner:
  - name: rl_bilidance_tracking_runner
    enabled: true
    param_tag: rl_bilidance_tracking
  manual_transition:
  - passive
  - pd_stand
  - walk
  - dance
  - stamp
  - power_shot
  auto_transition: walk
  key: [ RB, Y ]
